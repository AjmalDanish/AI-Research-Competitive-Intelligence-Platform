version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-website-intelligence-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-ai_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ai_password}
      POSTGRES_DB: ${DATABASE_NAME:-ai_website_intelligence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-ai_user} -d ${DATABASE_NAME:-ai_website_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-website-intelligence-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-website-intelligence-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-website-intelligence-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-website-intelligence-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DATABASE_USER:-ai_user}:${DATABASE_PASSWORD:-ai_password}@postgres:5432/${DATABASE_NAME:-ai_website_intelligence}
      - TEST_DATABASE_URL=postgresql+asyncpg://${DATABASE_USER:-ai_user}:${DATABASE_PASSWORD:-ai_password}@postgres:5432/${TEST_DATABASE_NAME:-ai_website_intelligence_test}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-True}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-website-intelligence-network

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  ai-website-intelligence-network:
    driver: bridge