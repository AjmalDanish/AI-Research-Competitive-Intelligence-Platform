# Phone Number Extraction Rules
# Version: 1.0.0

version: "1.0.0"
extractor: "phone"
description: "Deterministic phone number extraction patterns"

rules:
  # High confidence: JSON-LD structured data
  json_ld_phone:
    pattern: '"telephone"\s*:\s*"([+]?[(]?[0-9]{1,4}[)]?[-\s\./0-9]+)"'
    confidence: 1.00
    evidence_kind: "json_ld"
    confidence_source: "structured_data"
    enabled: true
    metadata:
      description: "Phone from JSON-LD structured data"

  # High confidence: Schema.org phone
  schema_org_phone:
    pattern: 'itemprop="telephone"[^>]*>([+]?[(]?[0-9]{1,4}[)]?[-\s\./0-9]+)'
    confidence: 0.98
    evidence_kind: "schema_org"
    confidence_source: "structured_data"
    enabled: true
    metadata:
      description: "Phone from Schema.org markup"

  # Medium confidence: tel: links
  tel_link_phone:
    pattern: 'tel:([+]?[(]?[0-9]{1,4}[)]?[-\s\./0-9]+)'
    confidence: 0.92
    evidence_kind: "html_structure"
    confidence_source: "verified_pattern"
    enabled: true
    metadata:
      description: "Phone from tel: link"

  # Medium confidence: US format
  us_phone_format:
    pattern: '\b\+?1[-.\s]?\(?[0-9]{3}\)?[-.\s]?[0-9]{3}[-.\s]?[0-9]{4}\b'
    confidence: 0.90
    evidence_kind: "regex_match"
    confidence_source: "verified_pattern"
    enabled: true
    metadata:
      description: "US phone number format"

  # Medium confidence: International format
  international_phone:
    pattern: '\b\+[0-9]{1,3}[-.\s]?[(]?[0-9]{1,4}[)]?[-.\s]?[0-9]{2,4}[-.\s]?[0-9]{2,4}[-.\s]?[0-9]{2,4}\b'
    confidence: 0.88
    evidence_kind: "regex_match"
    confidence_source: "verified_pattern"
    enabled: true
    metadata:
      description: "International phone number format"

  # Low confidence: Generic phone pattern
  generic_phone:
    pattern: '\b[0-9]{2,4}[-.\s]?[0-9]{2,4}[-.\s]?[0-9]{4,}\b'
    confidence: 0.70
    evidence_kind: "regex_match"
    confidence_source: "weak_pattern"
    enabled: true
    metadata:
      description: "Generic phone number pattern"

metadata:
  created_at: "2026-07-20"
  author: "AI Research Platform"
  confidence_strategy: "pattern_based"
  deterministic: true